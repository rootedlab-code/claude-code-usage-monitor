name: build
on:
  push:
    branches: [main]
  pull_request:

jobs:
  bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check
        run: python -m py_compile bridge/bridge.py
      - name: pricing.json valid
        run: python -c "import json; json.load(open('bridge/pricing.json'))"

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-
      - name: Install PlatformIO
        run: pip install platformio
      - name: Prepare secrets stub
        run: cp firmware/src/secrets.h.template firmware/src/secrets.h
      - name: Build firmware
        run: pio run -d firmware
