; PlatformIO Project — Claude Code Usage Monitor
; Board target: Waveshare ESP32-S3-LCD-1.47 (ESP32-S3R8, 16MB flash, 8MB OPI PSRAM)

[env:waveshare-esp32-s3-lcd-147]
platform        = espressif32
board           = esp32-s3-devkitm-1
framework       = arduino

; ----- USB & seriale -----
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, default
upload_speed    = 921600

; ----- Memoria / partizioni -----
; Il modulo ha 16MB flash + 8MB OPI PSRAM. qio_opi = QIO flash + OPI PSRAM.
board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_build.f_flash             = 80000000L
board_build.psram_type          = opi
board_build.f_cpu               = 240000000L
board_upload.flash_size         = 16MB
board_upload.maximum_size       = 16777216
board_build.partitions          = default_16MB.csv

; ----- Build flags -----
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -I src

; ----- Dipendenze -----
lib_deps =
    lvgl/lvgl@~8.3.10
    bblanchon/ArduinoJson@^7.0.0

lib_ldf_mode = deep+
